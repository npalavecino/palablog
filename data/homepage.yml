head:
  title: "Nicolás Palavecino | SRE & Engineering Manager"
  description: "Personal site for Nicolás Palavecino, SRE & Engineering Manager with a strong background in quality, performance, and observability. With over a decade of experience in IT operations and leadership, he has led distributed teams across Latin America and globally. Focused on transforming complex operations into simple, scalable, and resilient systems with real business impact."

# showcase
showcase:
  enable: true
  title: "Hello, I’m Nicolás."
  subtitle: "SRE & Engineering Manager"
  description: "Based in Santiago 🇨🇱, I lead distributed teams across Latin America and other regions worldwide, focusing on SRE, QA, and Performance. I’m passionate about turning complex operations into simple and reliable experiences, connecting technology, people, and strategy. I work within a <em>build it, run it</em> culture, emphasizing efficiency, stability, and response time.<br/><strong>My focus is on leading digital transformation initiatives with real business impact, while strengthening an executive vision aimed at creating value through technology.</strong>"
  image:
    alt: "Profile picture of Nicolás Palavecino"
    x: "images/nicolas.jpg"
    _2x: "images/nicolas@2x.jpg"
  imageMobile:
