# about
about:
  enable: true
  title: "Who am I?"
  content: '<p class="lead" style="font-size:16px;">
    I currently lead SRE, QA, and Performance teams in the logistics and retail sector. With experience managing distributed teams in Latin America and globally, my work focuses on aligning technology with business impact through observability, test automation, and reliable operations.
    </p>
    <p class="lead" style="font-size:16px;">
    My journey began in IT operations and evolved through roles in infrastructure, cloud, automation, and leadership. I believe in a hands-on, servant-leadership approach—connecting systems thinking, continuous improvement, and strategic vision.
    </p>
    <p class="lead" style="font-size:16px;">
    I’m focused on building the path toward an executive role (CTO/COO), grounded in strong engineering fundamentals, collaborative leadership, and business acumen.
    </p>'

  button:
    icon: "icon-smile-fill"
    btnText: "About Me"
    URL: "https://www.linkedin.com/in/nmpalavecino/"
  image:
    x: "images/about-me.png"
    _2x: "images/about-me@2x.png"

